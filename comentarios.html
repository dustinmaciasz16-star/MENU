<body>

  <!-- Canvas nieve -->

  <!-- Navbar (MISMO QUE INDEX) -->
  <nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand logo-text" href="index.html">DustinDev</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <ul class="navbar-nav">
        <li class="nav-item">

  <!-- CONTENIDO -->
  <main class="container text-center hero">

    <h1>Deja tu comentario</h1>
    <p class="mb-4">Tu opinión ayuda a mejorar este portafolio 🚀</p>

    <!-- FORMULARIO -->
    <form id="formulario" class="mx-auto" style="max-width: 500px;">
      <input class="form-control mb-2" type="text" id="nombre" placeholder="Tu nombre" required>
      <input class="form-control mb-2" type="email" id="correo" placeholder="Tu correo" required>
      <textarea class="form-control mb-3" id="comentario" placeholder="Escribe tu comentario..." required></textarea>

      <button class="btn btn-main w-100" type="submit">Enviar comentario</button>
    </form>
    <p class="text-warning mt-3" style="font-size: 14px;">
        ⚠️ Nota: Este sistema de comentarios funciona solo a nivel local (en tu navegador).
        Otros usuarios no podrán ver los comentarios publicados aquí.
    </p>

  </main>

  <!-- CONTENEDOR -->
  <section class="container mt-5">
    <div id="contenedor-comentarios"></div>
  </section>
